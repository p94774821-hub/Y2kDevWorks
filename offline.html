<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Offline - Y2K DevWorks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0000 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 500px;
            padding: 50px 40px;
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid rgba(255, 0, 0, 0.3);
            border-radius: 24px;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.2);
        }
        .icon {
            font-size: 5rem;
            color: #ff1a1a;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ff1a1a;
        }
        p {
            color: #999;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .status {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff1a1a;
            border-radius: 50px;
            color: #ff1a1a;
            font-weight: 600;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔴</div>
        <h1>Site Offline</h1>
        <p>O site está temporariamente offline para manutenção ou atualizações.</p>
        <p>Por favor, tente novamente mais tarde.</p>
        <div class="status">Status: Offline</div>
        <p style="margin-top: 40px; font-size: 0.85rem; color: #666;">
            Y2K DevWorks • Administração
        </p>
    </div>
</body>
</html>
